<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كالندر المواعيد — الطاقم الطبي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F7F3EA; --card:#FFFFFF; --line:#E7E0D2;
    --blue-deep:#0B3D66; --blue-mid:#1E6FA8; --blue-light:#5FA8D3;
    --gold:#D9A441; --gold-deep:#B9821F; --ink:#1E2A2E; --muted:#7A7264; --danger:#C65A52;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;padding:26px 20px 60px;position:relative;overflow-x:hidden;}
  h1{font-family:'Almarai',sans-serif;margin:0;}
  .wrap{max-width:820px;margin:0 auto;position:relative;z-index:1;}
  .blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.25;z-index:0;pointer-events:none;}
  .blob1{width:300px;height:300px;background:var(--blue-light);top:-110px;right:-90px;}
  .blob2{width:240px;height:240px;background:var(--gold);bottom:-70px;left:-90px;opacity:.2;}

  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
  .top h1{font-size:22px;font-weight:800;
    background:linear-gradient(90deg,var(--blue-deep),var(--blue-mid));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .top p{margin:4px 0 0;color:var(--muted);font-size:13px;}
  .btn{border:none;border-radius:10px;padding:9px 16px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
    background:transparent;border:1px solid var(--line);color:var(--muted);}

  .cal-panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:24px;
    box-shadow:0 6px 24px rgba(30,42,46,.05);}
  .profile-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 20px;margin-bottom:18px;
    display:flex;gap:20px;flex-wrap:wrap;align-items:center;box-shadow:0 4px 18px rgba(30,42,46,.04);}
  .profile-card .stat{display:flex;flex-direction:column;gap:2px;}
  .profile-card .stat .num{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:19px;color:var(--blue-deep);}
  .profile-card .stat .lbl{font-size:11.5px;color:var(--muted);}
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .cal-nav button{background:var(--mint,#EEF5F2);border:1px solid var(--line);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--blue-mid);}
  .cal-nav .month-label{font-family:'Almarai',sans-serif;font-weight:800;font-size:16px;color:var(--blue-deep);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{text-align:center;font-size:11.5px;color:var(--muted);font-weight:700;padding-bottom:6px;}
  .cal-day{aspect-ratio:1;border:1.5px solid var(--line);border-radius:10px;padding:6px;font-size:12.5px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#FDFCFA;position:relative;}
  .cal-day.empty{visibility:hidden;}
  .cal-day.today{border-color:var(--gold);}
  .cal-day.selected{background:linear-gradient(180deg,#fff,#EFF6FB);border-color:var(--blue-mid);}
  .cal-day .num{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .cal-day .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:4px;}
  .cal-day .count{font-size:10px;color:var(--blue-mid);font-weight:700;margin-top:2px;}

  .day-label{font-family:'Almarai',sans-serif;font-weight:800;font-size:15px;color:var(--gold-deep);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;}
  .appt{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 14px rgba(30,42,46,.04);}
  .appt .time{font-family:'Almarai',sans-serif;font-weight:800;color:var(--blue-deep);font-size:15px;min-width:64px;}
  .appt .info{flex:1;padding:0 14px;}
  .appt .info .name{font-weight:700;font-size:14px;}
  .appt .info .svc{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .appt .badge{background:rgba(30,111,168,.12);color:var(--blue-mid);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;}
  .appt.cancelled{opacity:.5;}
  .appt.cancelled .badge{background:rgba(198,90,82,.12);color:var(--danger);}

  .empty, .loading{color:var(--muted);text-align:center;padding:30px 0;font-size:14px;}
  .gate{max-width:380px;margin:80px auto;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div class="blob blob1"></div><div class="blob blob2"></div>
<div class="wrap" id="app"><div class="loading">جارٍ التحقق من الجلسة...</div></div>

<script>
const SUPABASE_URL = 'https://wrkhtqomywaqsiywqhcj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indya2h0cW9teXdhcXNpeXdxaGNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTEzNTQsImV4cCI6MjEwMDI4NzM1NH0.82xn22D3RUb-6Bp0avRk6-98SmkgL77a2zCTIRrpK_0';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const DOW = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

let staff = null;
let bookings = [];
let viewYear, viewMonth;
let selectedDate = null;

function escapeHtml(str){ const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
function pad(n){ return String(n).padStart(2,'0'); }

async function boot(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('app').innerHTML = `<div class="gate"><p>لازم تسجل دخول الأول.</p><a href="login.html" style="color:var(--blue-mid);font-weight:700;">تسجيل الدخول</a></div>`;
    return;
  }
  const { data: staffRows } = await sb.from('staff').select('*').eq('user_id', session.user.id).limit(1);
  staff = staffRows && staffRows[0];
  if (!staff) { document.getElementById('app').innerHTML = '<div class="gate"><p>الحساب مش مربوط بأي عيادة.</p></div>'; return; }

  const now = new Date();
  viewYear = now.getFullYear(); viewMonth = now.getMonth();
  selectedDate = now.toISOString().slice(0,10);

  renderShell();
  await loadBookings();
  renderProfileCard();
  renderCalendar();
  renderDay();
}

function renderProfileCard(){
  const total = bookings.filter(b => b.status !== 'cancelled').length;
  const cancelled = bookings.filter(b => b.status === 'cancelled').length;
  const today = new Date().toISOString().slice(0,10);
  const upcoming = bookings.filter(b => b.status !== 'cancelled' && b.appointment_date >= today).length;

  document.getElementById('profileCard').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">إجمالي الكشوفات</div></div>
    <div class="stat"><div class="num">${upcoming}</div><div class="lbl">مواعيد قادمة</div></div>
    <div class="stat"><div class="num">${cancelled}</div><div class="lbl">ملغاة</div></div>
  `;

function renderShell(){
  document.getElementById('app').innerHTML = `
    <div class="top">
      <div><h1>🗓️ ${escapeHtml(staff.doctor_name || 'كالندر المواعيد')}</h1><p>${escapeHtml(staff.specialty || '')}</p></div>
      <button class="btn" id="logoutBtn">تسجيل خروج</button>
    </div>
    <div class="profile-card" id="profileCard"></div>
    <div class="cal-panel">
      <div class="cal-nav">
        <button id="prevBtn">›</button>
        <div class="month-label" id="monthLabel"></div>
        <button id="nextBtn">‹</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="dayWrap"></div>
  `;
  document.getElementById('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'login.html'; });
  document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
  document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));
}

async function loadBookings(){
  const { data } = await sb.from('bookings').select('*').eq('clinic_id', staff.clinic_id).order('appointment_time');
  const all = data || [];
  bookings = all.filter(b => b.doctor_id === staff.id || !b.doctor_id);
}

function changeMonth(delta){
  viewMonth += delta;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;
  const grid = document.getElementById('calGrid');
  const firstDay = new Date(viewYear, viewMonth, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  const countByDate = {};
  bookings.forEach(b => {
    if (b.status !== 'cancelled') countByDate[b.appointment_date] = (countByDate[b.appointment_date] || 0) + 1;
  });

  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < startOffset; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;
    const count = countByDate[dateStr] || 0;
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedDate;
    html += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDay('${dateStr}')">
      <div class="num">${d}</div>
      ${count > 0 ? `<div class="count">${count}</div>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
}

function selectDay(dateStr){
  selectedDate = dateStr;
  renderCalendar();
  renderDay();
}
window.selectDay = selectDay;

function renderDay(){
  const wrap = document.getElementById('dayWrap');
  const dayBookings = bookings.filter(b => b.appointment_date === selectedDate);
  if (dayBookings.length === 0) {
    wrap.innerHTML = `<div class="day-label">📅 ${selectedDate}</div><div class="empty">مفيش مواعيد في اليوم ده</div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="day-label">📅 ${selectedDate}</div>
    ${dayBookings.map(b => `
      <div class="appt ${b.status === 'cancelled' ? 'cancelled' : ''}">
        <div class="time">${escapeHtml(b.appointment_time || '—')}</div>
        <div class="info"><div class="name">${escapeHtml(b.client_name)}</div><div class="svc">${escapeHtml(b.service_name)}</div></div>
        <span class="badge">${b.status === 'cancelled' ? 'ملغي' : 'مؤكد'}</span>
      </div>
    `).join('')}
  `;
}

boot();
</script>
</body>
</html>
