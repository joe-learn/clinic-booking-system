<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم العيادة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1A22; --panel:#152530; --panel-2:#1B2E3A; --line:#28404F;
    --text:#EAF1F5; --muted:#7F97A5; --gold:#E3A84B; --gold-dim:#8A6A34;
    --teal:#4FBFB8; --danger:#C97B6A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--text);font-family:'Tajawal',sans-serif;padding:28px 20px 60px;}
  .wrap{max-width:1100px;margin:0 auto;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;flex-wrap:wrap;gap:12px;}
  .top h1{font-size:24px;font-weight:900;margin:0;color:var(--gold);}
  .top p{margin:4px 0 0;color:var(--muted);font-size:13px;}
  .refresh-btn{background:var(--teal);border:none;color:#06201f;font-weight:700;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .kpi .label{color:var(--muted);font-size:12.5px;margin-bottom:8px;}
  .kpi .value{font-family:'IBM Plex Mono',monospace;font-size:24px;color:var(--gold);font-weight:600;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px;}
  th{text-align:right;color:var(--muted);font-weight:700;padding:12px 10px;border-bottom:1px solid var(--line);font-size:12px;white-space:nowrap;}
  td{padding:12px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .badge{padding:4px 10px;border-radius:100px;font-size:11.5px;font-weight:700;display:inline-block;}
  .badge.confirmed{background:rgba(79,191,184,.15);color:var(--teal);}
  .badge.cancelled{background:rgba(201,123,106,.15);color:var(--danger);}
  .badge.sent{background:rgba(79,191,184,.15);color:var(--teal);}
  .badge.failed{background:rgba(201,123,106,.15);color:var(--danger);}
  .cancel-btn{
    background:transparent;border:1px solid var(--danger);color:var(--danger);padding:6px 14px;border-radius:8px;
    font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;
  }
  .cancel-btn:disabled{opacity:.4;cursor:not-allowed;}
  .empty, .loading{color:var(--muted);text-align:center;padding:40px 0;font-size:14px;}
  .notes-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div>
      <h1>⚕ لوحة تحكم العيادة</h1>
      <p>كل الحجوزات في مكان واحد</p>
    </div>
    <button class="refresh-btn" id="refreshBtn">تحديث القائمة</button>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="label">إجمالي الحجوزات</div><div class="value" id="kpiTotal">—</div></div>
    <div class="kpi"><div class="label">مؤكدة</div><div class="value" id="kpiConfirmed">—</div></div>
    <div class="kpi"><div class="label">ملغاة</div><div class="value" id="kpiCancelled">—</div></div>
    <div class="kpi"><div class="label">فشل تأكيد الواتساب</div><div class="value" id="kpiFailed">—</div></div>
  </div>

  <div class="panel">
    <div id="tableWrap"><div class="loading">جارٍ تحميل الحجوزات...</div></div>
  </div>

</div>

<script>
const API_ENDPOINT = '/api/admin';

async function callApi(payload) {
  const res = await fetch(API_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('status ' + res.status);
  return res.json();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function statusBadge(status){
  const cls = status === 'cancelled' ? 'cancelled' : 'confirmed';
  const label = status === 'cancelled' ? 'ملغي' : 'مؤكد';
  return `<span class="badge ${cls}">${label}</span>`;
}

function whatsappBadge(status){
  if (status === 'failed') return '<span class="badge failed">فشلت ⚠️</span>';
  if (status === 'sent') return '<span class="badge sent">اتبعتت ✓</span>';
  return '<span class="badge">—</span>';
}

async function loadBookings(){
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="loading">جارٍ تحميل الحجوزات...</div>';

  let bookings = [];
  try{
    const result = await callApi({ action: 'list' });
    bookings = result.bookings || [];
  }catch(err){
    wrap.innerHTML = '<div class="empty">حصل خطأ في تحميل البيانات: ' + escapeHtml(err.message) + '</div>';
    return;
  }

  const total = bookings.length;
  const confirmed = bookings.filter(b => b.status !== 'cancelled').length;
  const cancelled = bookings.filter(b => b.status === 'cancelled').length;
  const failed = bookings.filter(b => b.whatsappStatus === 'failed').length;

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiConfirmed').textContent = confirmed;
  document.getElementById('kpiCancelled').textContent = cancelled;
  document.getElementById('kpiFailed').textContent = failed;

  if(total === 0){
    wrap.innerHTML = '<div class="empty">مفيش حجوزات لسه</div>';
    return;
  }

  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>الاسم</th><th>الهاتف</th><th>الخدمة</th><th>الموعد</th><th>ملاحظات</th><th>الحالة</th><th>الواتساب</th><th></th>
      </tr></thead>
      <tbody>
        ${bookings.map(b => `
          <tr data-booking-id="${escapeHtml(b.bookingId)}">
            <td>${escapeHtml(b.clientName)}</td>
            <td>${escapeHtml(b.phone)}</td>
            <td>${escapeHtml(b.serviceName)}</td>
            <td>${escapeHtml(b.appointmentDate)} — ${escapeHtml(b.appointmentTime)}</td>
            <td class="notes-cell" title="${escapeHtml(b.notes)}">${escapeHtml(b.notes) || '—'}</td>
            <td>${statusBadge(b.status)}</td>
            <td>${whatsappBadge(b.whatsappStatus)}</td>
            <td>
              ${b.status === 'cancelled'
                ? '<button class="cancel-btn" disabled>ملغي</button>'
                : `<button class="cancel-btn" onclick="cancelBooking('${escapeHtml(b.bookingId)}', this)">إلغاء</button>`
              }
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function cancelBooking(bookingId, btn){
  if(!confirm('متأكد إنك عايز تلغي الحجز ده؟')) return;
  btn.disabled = true;
  btn.textContent = 'جارٍ الإلغاء...';
  try{
    await callApi({ action: 'cancel', bookingId });
    await loadBookings();
  }catch(err){
    alert('حصل خطأ: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'إلغاء';
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadBookings);
loadBookings();
</script>
</body>
</html>
