<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم العيادة — صاحب العيادة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F7F3EA; --card:#FFFFFF; --line:#E7E0D2;
    --blue-deep:#0B3D66; --blue-mid:#1E6FA8; --blue-light:#5FA8D3;
    --gold:#D9A441; --gold-deep:#B9821F; --ink:#1E2A2E; --muted:#7A7264;
    --danger:#C65A52; --success:#4C9A6A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;padding:26px 20px 60px;position:relative;overflow-x:hidden;}
  h1,h2{font-family:'Almarai',sans-serif;margin:0;}
  .wrap{max-width:1100px;margin:0 auto;position:relative;z-index:1;}
  .blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.25;z-index:0;pointer-events:none;}
  .blob1{width:320px;height:320px;background:var(--blue-light);top:-120px;right:-100px;}
  .blob2{width:260px;height:260px;background:var(--gold);bottom:-80px;left:-100px;opacity:.2;}

  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .top h1{font-size:24px;font-weight:800;
    background:linear-gradient(90deg,var(--blue-deep),var(--blue-mid));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .top p{margin:4px 0 0;color:var(--muted);font-size:13px;}
  .actions{display:flex;gap:10px;align-items:center;}
  .btn{border:none;border-radius:10px;padding:10px 18px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;}
  .btn-primary{background:linear-gradient(100deg,var(--blue-deep),var(--blue-mid));color:#fff;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .kpi .label{color:var(--muted);font-size:12.5px;margin-bottom:8px;}
  .kpi .value{font-family:'IBM Plex Mono',monospace;font-size:24px;color:var(--blue-deep);font-weight:600;}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:8px;overflow-x:auto;
    box-shadow:0 6px 24px rgba(30,42,46,.05);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px;}
  th{text-align:right;color:var(--muted);font-weight:700;padding:12px 10px;border-bottom:1px solid var(--line);font-size:12px;white-space:nowrap;}
  td{padding:12px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .badge{padding:4px 10px;border-radius:100px;font-size:11.5px;font-weight:700;display:inline-block;}
  .badge.confirmed{background:rgba(30,111,168,.12);color:var(--blue-mid);}
  .badge.cancelled{background:rgba(198,90,82,.12);color:var(--danger);}
  .cancel-btn{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:6px 14px;border-radius:8px;
    font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;}
  .cancel-btn:disabled{opacity:.4;cursor:not-allowed;}
  .empty, .loading{color:var(--muted);text-align:center;padding:40px 0;font-size:14px;}
  .notes-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
  .gate{max-width:380px;margin:80px auto;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="wrap" id="app">
  <div class="loading">جارٍ التحقق من الجلسة...</div>
</div>

<script>
const SUPABASE_URL = 'https://wrkhtqomywaqsiywqhcj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indya2h0cW9teXdhcXNpeXdxaGNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTEzNTQsImV4cCI6MjEwMDI4NzM1NH0.82xn22D3RUb-6Bp0avRk6-98SmkgL77a2zCTIRrpK_0';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function statusBadge(status){
  const cls = status === 'cancelled' ? 'cancelled' : 'confirmed';
  const label = status === 'cancelled' ? 'ملغي' : 'مؤكد';
  return `<span class="badge ${cls}">${label}</span>`;
}

async function boot(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('app').innerHTML = `
      <div class="gate">
        <p>لازم تسجل دخول الأول عشان تشوف الصفحة دي.</p>
        <a href="login.html" style="color:var(--blue-mid);font-weight:700;">تسجيل الدخول</a>
      </div>`;
    return;
  }

  const { data: staffRows } = await sb.from('staff').select('*').eq('user_id', session.user.id).limit(1);
  const staff = staffRows && staffRows[0];
  if (!staff || staff.role !== 'owner') {
    document.getElementById('app').innerHTML = '<div class="gate"><p>الحساب ده مش مسجل كصاحب عيادة.</p></div>';
    return;
  }

  currentClinicId = staff.clinic_id;
  renderShell();
  loadBookings(staff.clinic_id);
}

function renderShell(){
  document.getElementById('app').innerHTML = `
    <div class="top">
      <div>
        <h1>⚕ لوحة تحكم العيادة</h1>
        <p>كل الحجوزات في مكان واحد</p>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="logoutBtn">تسجيل خروج</button>
        <button class="btn btn-primary" id="refreshBtn">تحديث</button>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="label">إجمالي الحجوزات</div><div class="value" id="kpiTotal">—</div></div>
      <div class="kpi"><div class="label">مؤكدة</div><div class="value" id="kpiConfirmed">—</div></div>
      <div class="kpi"><div class="label">ملغاة</div><div class="value" id="kpiCancelled">—</div></div>
    </div>
    <div class="panel" style="margin-bottom:24px;padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
        <h2 style="font-family:'Almarai',sans-serif;font-size:15px;margin:0;color:var(--blue-deep);">👨‍⚕️ إدارة الدكاترة</h2>
        <button class="btn btn-primary" id="showAddDoctorBtn" style="padding:8px 14px;font-size:12.5px;">+ إضافة دكتور</button>
      </div>
      <div id="doctorsListWrap"><div class="loading">جارٍ تحميل الدكاترة...</div></div>
      <div id="addDoctorPanel" style="display:none;margin-top:16px;padding-top:16px;border-top:1.5px dashed var(--line);">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px;">
          <input type="text" id="newDoctorName" placeholder="اسم الدكتور" style="border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Tajawal',sans-serif;">
          <input type="text" id="newDoctorSpecialty" placeholder="التخصص" style="border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Tajawal',sans-serif;">
          <input type="email" id="newDoctorEmail" placeholder="الإيميل (لتسجيل الدخول)" style="border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Tajawal',sans-serif;">
          <input type="password" id="newDoctorPassword" placeholder="كلمة المرور" style="border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Tajawal',sans-serif;">
        </div>
        <button class="btn btn-primary" id="confirmAddDoctorBtn">حفظ الدكتور</button>
        <div id="addDoctorMsg" style="margin-top:10px;font-size:12.5px;"></div>
      </div>
    </div>
    <div class="panel"><div id="tableWrap"><div class="loading">جارٍ تحميل الحجوزات...</div></div></div>
  `;
  document.getElementById('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'login.html'; });
  document.getElementById('showAddDoctorBtn').addEventListener('click', () => {
    const p = document.getElementById('addDoctorPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('confirmAddDoctorBtn').addEventListener('click', addDoctor);
  loadDoctors();
}

async function loadDoctors(){
  const wrap = document.getElementById('doctorsListWrap');
  const { data, error } = await sb.from('staff').select('*').eq('clinic_id', currentClinicId).eq('role', 'doctor');
  if (error) { wrap.innerHTML = '<div class="empty">حصل خطأ: ' + escapeHtml(error.message) + '</div>'; return; }
  if (!data || data.length === 0) { wrap.innerHTML = '<div class="empty" style="padding:14px 0;">مفيش دكاترة مسجلين لسه</div>'; return; }
  wrap.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:10px;">
    ${data.map(d => `
      <div style="background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 16px;">
        <div style="font-weight:700;font-size:13.5px;">${escapeHtml(d.doctor_name || '—')}</div>
        <div style="color:var(--muted);font-size:12px;">${escapeHtml(d.specialty || '')}</div>
      </div>
    `).join('')}
  </div>`;
}

async function addDoctor(){
  const name = document.getElementById('newDoctorName').value;
  const specialty = document.getElementById('newDoctorSpecialty').value;
  const email = document.getElementById('newDoctorEmail').value;
  const password = document.getElementById('newDoctorPassword').value;
  const msgBox = document.getElementById('addDoctorMsg');
  msgBox.textContent = '';

  if (!name || !email || !password) { msgBox.textContent = 'كل الحقول مطلوبة.'; msgBox.style.color = 'var(--danger)'; return; }

  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { msgBox.textContent = 'حصل خطأ: ' + error.message; msgBox.style.color = 'var(--danger)'; return; }

  const { error: staffError } = await sb.from('staff').insert({
    user_id: data.user.id, clinic_id: currentClinicId, role: 'doctor', doctor_name: name, specialty
  });
  if (staffError) { msgBox.textContent = 'اتعمل الحساب بس حصل خطأ في الربط: ' + staffError.message; msgBox.style.color = 'var(--danger)'; return; }

  msgBox.textContent = 'تم إضافة الدكتور بنجاح! (لو الحساب محتاج تأكيد إيميل، خليه يفتح بريده ويأكد الأول قبل ما يسجل دخول)';
  msgBox.style.color = 'var(--success)';
  document.getElementById('newDoctorName').value = '';
  document.getElementById('newDoctorSpecialty').value = '';
  document.getElementById('newDoctorEmail').value = '';
  document.getElementById('newDoctorPassword').value = '';
  loadDoctors();
}

let currentClinicId = null;

async function loadBookings(clinicId){
  currentClinicId = clinicId || currentClinicId;
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="loading">جارٍ تحميل الحجوزات...</div>';

  const { data: bookings, error } = await sb.from('bookings').select('*').eq('clinic_id', currentClinicId).order('appointment_date');

  if (error) { wrap.innerHTML = '<div class="empty">حصل خطأ: ' + escapeHtml(error.message) + '</div>'; return; }

  const total = bookings.length;
  const cancelled = bookings.filter(b => b.status === 'cancelled').length;
  const confirmed = total - cancelled;
  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiConfirmed').textContent = confirmed;
  document.getElementById('kpiCancelled').textContent = cancelled;

  if (total === 0) { wrap.innerHTML = '<div class="empty">مفيش حجوزات لسه</div>'; return; }

  wrap.innerHTML = `
    <table>
      <thead><tr><th>الاسم</th><th>الهاتف</th><th>الخدمة</th><th>الموعد</th><th>ملاحظات</th><th>الحالة</th><th></th></tr></thead>
      <tbody>
        ${bookings.map(b => `
          <tr>
            <td>${escapeHtml(b.client_name)}</td>
            <td>${escapeHtml(b.phone)}</td>
            <td>${escapeHtml(b.service_name)}</td>
            <td>${escapeHtml(b.appointment_date)} — ${escapeHtml(b.appointment_time)}</td>
            <td class="notes-cell" title="${escapeHtml(b.notes)}">${escapeHtml(b.notes) || '—'}</td>
            <td>${statusBadge(b.status)}</td>
            <td>${b.status === 'cancelled'
              ? '<button class="cancel-btn" disabled>ملغي</button>'
              : `<button class="cancel-btn" onclick="cancelBooking('${b.id}', this)">إلغاء</button>`}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function cancelBooking(id, btn){
  if(!confirm('متأكد إنك عايز تلغي الحجز ده؟')) return;
  btn.disabled = true; btn.textContent = 'جارٍ الإلغاء...';
  const { error } = await sb.from('bookings').update({ status: 'cancelled' }).eq('id', id);
  if (error) { alert('حصل خطأ: ' + error.message); btn.disabled = false; btn.textContent = 'إلغاء'; return; }
  loadBookings();
}
window.cancelBooking = cancelBooking;

document.addEventListener('click', (e) => { if (e.target.id === 'refreshBtn') loadBookings(); });

boot();
</script>
</body>
</html>
